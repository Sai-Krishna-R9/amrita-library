<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stacks — Library Availability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF7;
    --ink:#20262B;
    --ink-soft:#5B6570;
    --line:#DEDBD1;
    --available:#2F6F4E;
    --available-bg:#E8F1EC;
    --unavailable:#B5533C;
    --unavailable-bg:#F6EAE6;
    --accent:#3B5BA5;
    --card-bg:#FFFFFF;

    --spine-fiction:#8C6C8F;
    --spine-tech:#3B5BA5;
    --spine-science:#2C7A76;
    --spine-history:#B5893B;
    --spine-business:#6B6259;
    --spine-psychology:#B5647C;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  h1, h2, h3{
    font-family:'Fraunces', Georgia, 'Times New Roman', serif;
    margin:0;
  }

  .mono{
    font-family:'IBM Plex Mono', 'Courier New', monospace;
  }

  header.site{
    max-width:1040px;
    margin:0 auto;
    padding:56px 24px 32px;
    border-bottom:1px solid var(--line);
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:10px;
  }

  header.site h1{
    font-size:44px;
    font-weight:600;
    letter-spacing:-0.01em;
  }

  header.site p.tagline{
    margin:12px 0 0;
    color:var(--ink-soft);
    font-size:16px;
    max-width:520px;
    line-height:1.5;
  }

  main{
    max-width:1040px;
    margin:0 auto;
    padding:32px 24px 80px;
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    align-items:center;
    margin-bottom:28px;
  }

  .search-wrap{
    position:relative;
    flex:1 1 280px;
  }

  .search-wrap input{
    width:100%;
    padding:13px 16px 13px 40px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--card-bg);
    font-size:15px;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    outline:none;
    transition:border-color .15s ease;
  }

  .search-wrap input:focus{
    border-color:var(--accent);
  }

  .search-wrap svg{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    width:16px;
    height:16px;
    stroke:var(--ink-soft);
  }

  .filters{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .chip{
    border:1px solid var(--line);
    background:var(--card-bg);
    color:var(--ink-soft);
    padding:9px 14px;
    border-radius:999px;
    font-size:13px;
    font-family:'Inter', sans-serif;
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
  }

  .chip:hover{
    border-color:var(--accent);
    color:var(--ink);
  }

  .chip.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--paper);
  }

  .status-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
    color:var(--ink-soft);
    font-size:13px;
  }

  .status-row .mono{
    font-size:12px;
    letter-spacing:0.04em;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:18px;
  }

  .card{
    position:relative;
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px 20px 20px 22px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .card::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:6px;
    background:var(--spine-color, var(--accent));
  }

  .card .genre-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }

  .card h3{
    font-size:19px;
    font-weight:600;
    line-height:1.3;
    color:var(--ink);
  }

  .card .author{
    font-size:14px;
    color:var(--ink-soft);
    margin-top:-6px;
  }

  .card .call-number{
    font-size:12px;
    color:var(--ink-soft);
  }

  .stamp{
    align-self:flex-start;
    margin-top:6px;
    padding:5px 11px;
    border:1.5px solid currentColor;
    border-radius:3px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    transform:rotate(-2.5deg);
  }

  .stamp.available{
    color:var(--available);
    background:var(--available-bg);
  }

  .stamp.unavailable{
    color:var(--unavailable);
    background:var(--unavailable-bg);
  }

  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:64px 24px;
    color:var(--ink-soft);
  }

  .empty-state h3{
    font-size:20px;
    color:var(--ink);
    margin-bottom:8px;
    font-weight:600;
  }

  footer{
    max-width:1040px;
    margin:0 auto;
    padding:24px;
    color:var(--ink-soft);
    font-size:12px;
    border-top:1px solid var(--line);
    font-family:'IBM Plex Mono', monospace;
  }

  @media (max-width:600px){
    header.site h1{ font-size:32px; }
    header.site{ padding:40px 20px 28px; }
    main{ padding:24px 20px 60px; }
  }

  :focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
</style>
</head>
<body>

<header class="site">
  <div class="eyebrow">University Library · Catalog</div>
  <h1>Stacks</h1>
  <p class="tagline">Check what's on the shelf before you make the trip. Search the catalog and see availability in real time.</p>
</header>

<main>
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="searchInput" type="text" placeholder="Search by title or author…" autocomplete="off">
    </div>
    <div class="filters" id="filterChips"></div>
  </div>

  <div class="status-row">
    <span id="resultCount" class="mono">— results</span>
    <span class="mono" id="lastUpdated"></span>
  </div>

  <div class="grid" id="bookGrid"></div>
</main>

<footer>
  Stacks — a student library project · Sample catalog data
</footer>

<script>
  // ---- Sample catalog data ----
  // Later this array can be replaced by data fetched from a Google Sheet or Firebase.
  const books = [
    { title: "Clean Code", author: "Robert C. Martin", genre: "Tech", callNumber: "QA76.6 .M3675", available: true },
    { title: "Introduction to Algorithms", author: "Cormen, Leiserson, Rivest, Stein", genre: "Tech", callNumber: "QA76.6 .I5858", available: false },
    { title: "1984", author: "George Orwell", genre: "Fiction", callNumber: "PR6029.R8 N4", available: true },
    { title: "Pride and Prejudice", author: "Jane Austen", genre: "Fiction", callNumber: "PR4034 .P7", available: false },
    { title: "A Brief History of Time", author: "Stephen Hawking", genre: "Science", callNumber: "QB981 .H377", available: true },
    { title: "The Selfish Gene", author: "Richard Dawkins", genre: "Science", callNumber: "QH375 .D37", available: true },
    { title: "Sapiens", author: "Yuval Noah Harari", genre: "History", callNumber: "CB113 .H37", available: false },
    { title: "Guns, Germs, and Steel", author: "Jared Diamond", genre: "History", callNumber: "CC175 .D48", available: true },
    { title: "Thinking, Fast and Slow", author: "Daniel Kahneman", genre: "Psychology", callNumber: "BF441 .K34", available: true },
    { title: "Man's Search for Meaning", author: "Viktor Frankl", genre: "Psychology", callNumber: "BF109.F7 F73", available: false },
    { title: "The Lean Startup", author: "Eric Ries", genre: "Business", callNumber: "HD62.5 .R545", available: true },
    { title: "Zero to One", author: "Peter Thiel", genre: "Business", callNumber: "HB615 .T485", available: true },
    { title: "The Pragmatic Programmer", author: "Hunt & Thomas", genre: "Tech", callNumber: "QA76.76.D47 H86", available: false },
    { title: "One Hundred Years of Solitude", author: "Gabriel García Márquez", genre: "Fiction", callNumber: "PQ8180.17.A73 C5", available: true },
    { title: "Cosmos", author: "Carl Sagan", genre: "Science", callNumber: "QB44.2 .S24", available: true }
  ];

  const genreColors = {
    Fiction: "var(--spine-fiction)",
    Tech: "var(--spine-tech)",
    Science: "var(--spine-science)",
    History: "var(--spine-history)",
    Business: "var(--spine-business)",
    Psychology: "var(--spine-psychology)"
  };

  const grid = document.getElementById("bookGrid");
  const searchInput = document.getElementById("searchInput");
  const filterChips = document.getElementById("filterChips");
  const resultCount = document.getElementById("resultCount");
  const lastUpdated = document.getElementById("lastUpdated");

  let activeFilter = "all";
  let searchTerm = "";

  // Build filter chips dynamically from genres present in the data, plus All / Available
  function buildFilters(){
    const genres = [...new Set(books.map(b => b.genre))];
    const options = [
      { key: "all", label: "All" },
      { key: "available", label: "Available now" },
      ...genres.map(g => ({ key: g, label: g }))
    ];

    filterChips.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "chip" + (opt.key === activeFilter ? " active" : "");
      btn.textContent = opt.label;
      btn.setAttribute("aria-pressed", opt.key === activeFilter);
      btn.addEventListener("click", () => {
        activeFilter = opt.key;
        buildFilters();
        render();
      });
      filterChips.appendChild(btn);
    });
  }

  function matchesFilter(book){
    if (activeFilter === "all") return true;
    if (activeFilter === "available") return book.available;
    return book.genre === activeFilter;
  }

  function matchesSearch(book){
    if (!searchTerm) return true;
    const t = searchTerm.toLowerCase();
    return book.title.toLowerCase().includes(t) || book.author.toLowerCase().includes(t);
  }

  function render(){
    const results = books.filter(b => matchesFilter(b) && matchesSearch(b));

    resultCount.textContent = `${results.length} result${results.length === 1 ? "" : "s"}`;

    grid.innerHTML = "";

    if (results.length === 0){
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.innerHTML = `<h3>No books found</h3><p>Try a different title, author, or filter.</p>`;
      grid.appendChild(empty);
      return;
    }

    results.forEach(book => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.setProperty("--spine-color", genreColors[book.genre] || "var(--accent)");

      card.innerHTML = `
        <span class="genre-label">${book.genre}</span>
        <h3>${book.title}</h3>
        <div class="author">${book.author}</div>
        <div class="call-number mono">${book.callNumber}</div>
        <span class="stamp ${book.available ? "available" : "unavailable"}">
          ${book.available ? "On shelf" : "Checked out"}
        </span>
      `;
      grid.appendChild(card);
    });
  }

  searchInput.addEventListener("input", (e) => {
    searchTerm = e.target.value;
    render();
  });

  lastUpdated.textContent = "Updated " + new Date().toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });

  buildFilters();
  render();
</script>

</body>
</html>
